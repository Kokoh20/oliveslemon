<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign in</title>
    <style>
      :root { --gap: 12px; --fg: #1f2937; --muted: #6b7280; --err: #b00020; --border:#e5e7eb; --primary:#111827; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif; color: var(--fg); background:#fafafa; margin:0; }
      .container { max-width: 380px; margin: 10vh auto; padding: 28px; background:#fff; border:1px solid var(--border); border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.04); }
      h1 { margin: 0 0 10px; font-size: 22px; }
      p.sub { margin: 0 0 18px; color: var(--muted); font-size: 14px; }
      form { display: grid; gap: var(--gap); }
      label { font-size: 13px; }
      input[type="text"], input[type="email"], input[type="password"] {
        width: 100%; padding: 10px 12px; border:1px solid var(--border); border-radius: 8px; font-size: 14px; background:#fff;
      }
      .row { display:flex; align-items:center; justify-content:space-between; }
      .error { color: var(--err); font-size: 13px; display:none; }
      button[type="submit"] {
        background: var(--primary); color:#fff; padding: 10px 14px; border:0; border-radius: 8px; font-weight: 600; cursor: pointer;
      }
      button[disabled] { opacity:.6; cursor:not-allowed; }
      a { color:#2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Sign in</h1>
      <p class="sub">Access your account</p>

      <form id="login-form" novalidate>
        <div>
          <label for="identifier">Email or Username</label>
          <input id="identifier" name="identifier" type="text" autocomplete="username" required />
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required minlength="6" />
        </div>

        <div class="row">
          <label><input id="remember" name="remember" type="checkbox" /> Remember me</label>
          <a href="/forgot-password">Forgot password?</a>
        </div>

        <div id="error" class="error" role="alert"></div>

        <button id="submit" type="submit">Sign in</button>
      </form>
    </main>

    <script>
      const form = document.getElementById('login-form');
      const errorBox = document.getElementById('error');
      const submitBtn = document.getElementById('submit');

      async function signIn(payload) {
        
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'include' 
        });
        if (!res.ok) {
          let message = 'Login failed';
          try { const body = await res.json(); message = body.message || message; } catch {}
          throw new Error(message);
        }
        
        window.location.href = 'index.html'; 
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';
        const identifier = form.identifier.value.trim();
        const password = form.password.value;

        if (!identifier || !password) {
          errorBox.textContent = 'Please enter your credentials.';
          errorBox.style.display = 'block';
          return;
        }

        submitBtn.disabled = true;
        const prev = submitBtn.textContent;
        submitBtn.textContent = 'Signing in…';

        try {
          await signIn({ identifier, password, remember: form.remember.checked });
        } catch (err) {
          errorBox.textContent = err.message || 'Login failed';
          errorBox.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = prev;
        }
      });
    </script>
  </body>
</html>
