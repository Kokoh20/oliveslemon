        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">

        </div>

    <div class="container mt-5 mb-5">
      <h1 class="text-center mb-4">Order Your Favorites</h1>

      <form method="POST" action="submit_order.php" id="orderForm">
        <div class="mb-3">
          <label class="form-label">Select Items</label>
          <div class="form-check">
            <input class="form-check-input item-checkbox" data-price="80" type="checkbox" name="items[Brewed Coffee]" value="1" id="coffee">
            <label class="form-check-label" for="coffee">Brewed Coffee - ₱80</label>
          </div>
          <div class="form-check">
            <input class="form-check-input item-checkbox" data-price="120" type="checkbox" name="items[Caramel Macchiato]" value="1" id="macchiato">
            <label class="form-check-label" for="macchiato">Caramel Macchiato - ₱120</label>
          </div>
          <div class="form-check">
            <input class="form-check-input item-checkbox" data-price="90" type="checkbox" name="items[Chocolate Cake]" value="1" id="cake">
            <label class="form-check-label" for="cake">Chocolate Cake Slice - ₱90</label>
          </div>
        </div>

        <div class="mb-3">
          <label for="customerName" class="form-label">Your Name</label>
          <input type="text" class="form-control" name="customerName" id="customerName" required>
        </div>

        <div class="mb-3">
          <label for="contactNumber" class="form-label">Contact Number</label>
          <input type="tel" class="form-control" name="contactNumber" id="contactNumber" required>
        </div>

        <div class="mb-3">
          <label for="deliveryAddress" class="form-label">Delivery Address</label>
          <textarea class="form-control" name="deliveryAddress" id="deliveryAddress" rows="3" required></textarea>
        </div>

        <div class="mb-3">
          <strong>Order Total: ₱<span id="orderTotal">0</span></strong>
        </div>

        <button type="submit" class="btn btn-success">Submit Order</button>
      </form>
    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js" defer></script>
  <script>
    function recalcTotal(){
      let total = 0;
      document.querySelectorAll('.item-checkbox').forEach(cb => {
        if(cb.checked){ total += Number(cb.dataset.price || 0); }
      });
      document.getElementById('orderTotal').textContent = total;
    }
    document.querySelectorAll('.item-checkbox').forEach(cb => cb.addEventListener('change', recalcTotal));
    recalcTotal();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
