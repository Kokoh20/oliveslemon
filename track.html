<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order</title>
    <link rel="icon" type="image/x-icon" href="assets/images/logo1-removebg-preview.png">
    <link rel="stylesheet" href="shop.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
      .status-badge { text-transform: uppercase; }
      .muted { color:#6c757d; }
      .timeline { display:flex; gap:8px; align-items:center; }
      .dot { width:10px; height:10px; border-radius:50%; background:#dee2e6; }
      .dot.active { background:#0d6efd; }
    </style>
  </head>
  <body>
    <header class="store-header">
      <div class="store-top container">
        <div class="brand">
          <img src="assets/images/logo1-removebg-preview.png" alt="Logo"/>
          <div class="brand-text">
            <h1>Track Order</h1>
            <p>Olives and Lemon To Go</p>
          </div>
        </div>
        <div class="meta">
          <a href="index.html" class="btn btn-outline-light">Back to Store</a>
        </div>
      </div>
      <div class="canopy"></div>
      <div class="canopy canopy-alt"></div>
    </header>

    <main class="container" style="padding-bottom:40px;">
      <div class="card mt-4">
        <div class="card-body">
          <div class="row g-3 align-items-center">
            <div class="col-md-8">
              <label for="trackId" class="form-label">Enter Order ID</label>
              <input id="trackId" type="text" class="form-control" placeholder="e.g., ord_...">
            </div>
            <div class="col-md-4 d-grid d-md-flex align-items-end">
              <button id="trackBtn" class="btn btn-primary w-100"><i class="fa-solid fa-location-crosshairs"></i> Track</button>
            </div>
          </div>
        </div>
      </div>

      <div id="result" class="vstack gap-3 mt-4"></div>
    </main>

    <script src="track.js"></script>
  </body>
</html>
