<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Order Checkout - Olives and Lemon</title>
    <link rel="icon" type="image/x-icon" href="assets/images/logo1-removebg-preview.png">
    <link rel="stylesheet" href="shop.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  </head>
  <body>
    <header class="store-header">
      <div class="store-top container">
        <div class="brand">
          <img src="assets/images/logo1-removebg-preview.png" alt="Logo"/>
          <div class="brand-text">
            <h1>Order Checkout</h1>
            <p>Olives and Lemon Cafe To Go</p>
          </div>
        </div>
      </div>
      <div class="canopy"></div>
      <div class="canopy canopy-alt"></div>
    </header>

    <main class="container" style="padding-bottom: 40px;">
      <nav style="margin: 16px 0; color:#666;"><a href="index.html" style="text-decoration:none;color:#666"><i class="fa-solid fa-angle-left"></i> Order Checkout</a></nav>

      <div class="row g-4">
        <div class="col-lg-7">
          <h2 class="section-title" style="margin-top:0">Order Summary</h2>
          <div id="orderList" class="vstack gap-3"></div>

          <div class="card mt-3">
            <div class="card-body">
              <div class="input-group input-group-lg">
                <input id="couponInput" type="text" class="form-control" placeholder="Get coupon code">
                <button class="btn btn-outline-primary" id="applyCoupon">Apply</button>
              </div>
              <div class="mt-3">
                <div class="d-flex justify-content-between"><div>Subtotal</div><div>₱ <span id="subtotal">0.00</span></div></div>
                <div class="d-flex justify-content-between"><div>Discount</div><div>- ₱ <span id="discount">0.00</span></div></div>
                <hr>
                <div class="d-flex justify-content-between fw-bold"><div>Amount Payable</div><div>₱ <span id="payable">0.00</span></div></div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <h2 class="section-title" style="margin-top:0">Order Details</h2>
          <div class="vstack gap-3">
            <div class="card"><div class="card-body">
              <div class="mb-3">
                <label for="customerName" class="form-label">Full Name</label>
                <input id="customerName" type="text" class="form-control" placeholder="Juan Dela Cruz">
              </div>
              <div class="mb-3">
                <label for="phoneNumber" class="form-label">Phone Number</label>
                <input id="phoneNumber" type="tel" class="form-control" placeholder="0917 123 4567">
              </div>
              <div class="mb-3">
                <label for="deliveryAddress" class="form-label">Address (for Delivery)</label>
                <textarea id="deliveryAddress" class="form-control" rows="2" placeholder="Street, Barangay, City"></textarea>
              </div>
              <div class="mb-2 fw-bold">Order Type</div>
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o1" value="dine-in"><label class="form-check-label" for="o1">ADVANCE ORDER FOR DINE IN</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o2" value="pre-order"><label class="form-check-label" for="o2">PRE-ORDER</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o3" value="pickup" checked><label class="form-check-label" for="o3">PICKUP</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="otype" id="o4" value="delivery"><label class="form-check-label" for="o4">DELIVERY</label></div>

              <div class="mb-2 fw-bold mt-3">Payment Method</div>
              <div class="form-check"><input class="form-check-input" type="radio" name="pmt" id="pay_cash" value="cash"><label class="form-check-label" for="pay_cash">Cash</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="pmt" id="pay_paypal" value="paypal"><label class="form-check-label" for="pay_paypal">PayPal</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="pmt" id="pay_gcash" value="gcash" checked><label class="form-check-label" for="pay_gcash">GCash</label></div>
              <div class="form-check"><input class="form-check-input" type="radio" name="pmt" id="pay_card" value="card"><label class="form-check-label" for="pay_card">Card</label></div>

              <div id="onlineBox" class="mt-2 d-none">
                <div id="paypalButtons" class="mb-2 d-none"></div>
                <div id="gcashBox" class="d-none">
                  <button id="gcashPay" type="button" class="btn btn-primary btn-sm">Pay with GCash</button>
                </div>
                <div id="cardBox" class="d-none">
                  <button id="cardPay" type="button" class="btn btn-outline-primary btn-sm">Pay with Card</button>
                </div>
                <span id="payStatus" class="ms-2 text-success d-none">Paid • Ref: <code id="payRef">...</code></span>
              </div>
            </div></div>
            <a href="index.html" class="btn btn-outline-secondary btn-lg">Continue Shopping</a>
          </div>
        </div>
      </div>
    </main>

    <div class="cart-bar">
      <div class="items"><i class="fa-solid fa-cart-shopping"></i> <span id="cartCount">0</span> items</div>
      <button class="checkout" id="placeOrder" style="cursor: pointer;">PLACE ORDER</button>
      <a id="receiptBtn" class="checkout d-none" href="#" target="_blank">VIEW RECEIPT</a>
      <div class="total">₱ <span id="cartTotal">0.00</span></div>
    </div>

    <!-- Success toast for Order ID -->
    <div id="orderToast" class="custom-toast d-none" role="status" aria-live="polite">
      <div class="custom-toast-body">
        <div class="toast-title">Order placed!</div>
        <div class="toast-text">Your Order ID is <code id="toastOrderId">...</code></div>
        <div class="toast-actions">
          <button id="toastTrackBtn" class="btn btn-primary btn-sm">Track Now</button>
          <a id="toastReceiptBtn" class="btn btn-success btn-sm" href="#" target="_blank">View Receipt</a>
          <button id="toastCloseBtn" class="btn btn-light btn-sm">Close</button>
        </div>
      </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=PHP"></script>
    <script src="checkout.js"></script>
  </body>
</html>
