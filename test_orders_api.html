<!DOCTYPE html>
<html>
<head>
    <title>Test Orders API</title>
</head>
<body>
    <h1>Orders API Test</h1>
    <button onclick="testOrders()">Test Orders API</button>
    <div id="result"></div>
    
    <script>
    async function testOrders() {
        try {
            const response = await fetch('http://127.0.0.1:3000/orders.php');
            const data = await response.json();
            document.getElementById('result').innerHTML = `
                <h3>API Response:</h3>
                <pre>${JSON.stringify(data, null, 2)}</pre>
                <p><strong>Total Orders:</strong> ${data.orders ? data.orders.length : 0}</p>
            `;
        } catch (error) {
            document.getElementById('result').innerHTML = `
                <h3>Error:</h3>
                <p style="color: red;">${error.message}</p>
            `;
        }
    }
    </script>
</body>
</html>
